# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk sqlite3
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv,venv,__pycache__,.git
    
    - name: Create database directory
      run: |
        mkdir -p database_sqlite
    
    - name: Test database initialization
      run: |
        python -c "from src.config.database import DatabaseConnection; from src.config.database_initializer import DatabaseInitializer; from src.config.database_seeder import DatabaseSeeder; db = DatabaseConnection(); init = DatabaseInitializer(db); init.initialize_database(); seed = DatabaseSeeder(db); seed.seed_all(); print('Database initialized successfully')"
    
    - name: Verify database
      run: |
        sqlite3 database_sqlite/scee_loja.db "SELECT COUNT(*) as total FROM usuarios;"
        sqlite3 database_sqlite/scee_loja.db "SELECT COUNT(*) as total FROM produtos;"
        sqlite3 database_sqlite/scee_loja.db "SELECT COUNT(*) as total FROM categorias;"
    
    - name: Test with pytest
      run: |
        pytest tests/ -v --cov=src --cov-report=term-missing || echo "Tests not found, skipping"
    
    - name: Upload coverage reports
      if: success()
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
