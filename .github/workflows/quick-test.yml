# Workflow simplificado para testes básicos
name: CI - Quick Tests

on:
  push:
    branches: [ "main", "feature/**", "docs/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quick-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python syntax
      run: |
        python -m py_compile src/**/*.py || echo "Syntax check completed"
    
    - name: Initialize database
      run: |
        python -c "
        from src.config.database import DatabaseConnection
        from src.config.database_initializer import DatabaseInitializer
        from src.config.database_seeder import DatabaseSeeder
        
        db = DatabaseConnection()
        init = DatabaseInitializer(db)
        
        if not init.check_database_exists():
            init.initialize_database()
            
        seed = DatabaseSeeder(db)
        if not seed.check_if_seeded():
            seed.seed_all()
            
        print('✓ Database ready')
        "
    
    - name: Verify data
      run: |
        python -c "
        from src.config.database import DatabaseConnection
        
        db = DatabaseConnection()
        conn = db.get_connection()
        cursor = conn.cursor()
        
        cursor.execute('SELECT COUNT(*) FROM usuarios')
        users = cursor.fetchone()[0]
        
        cursor.execute('SELECT COUNT(*) FROM produtos')
        products = cursor.fetchone()[0]
        
        cursor.execute('SELECT COUNT(*) FROM categorias')
        categories = cursor.fetchone()[0]
        
        print(f'✓ Usuários: {users}')
        print(f'✓ Produtos: {products}')
        print(f'✓ Categorias: {categories}')
        
        assert users >= 2, 'Deve ter pelo menos 2 usuários'
        assert products >= 15, 'Deve ter pelo menos 15 produtos'
        assert categories >= 5, 'Deve ter pelo menos 5 categorias'
        
        print('✓ All checks passed!')
        "
